{% load static %}
<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Parolni o'zgartirish</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background: #f0f4ff; }
        .topbar {
            background: linear-gradient(135deg, #1a237e, #1565c0);
            color: white;
            padding: 12px 24px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .topbar h5 { margin: 0; font-weight: 700; }
        .card-form {
            border-radius: 16px;
            border: none;
            box-shadow: 0 4px 20px rgba(0,0,0,0.1);
            max-width: 450px;
            margin: 60px auto;
        }
        .card-header-custom {
            background: linear-gradient(135deg, #1a237e, #1565c0);
            color: white;
            border-radius: 16px 16px 0 0;
            padding: 16px 24px;
            font-weight: 700;
            font-size: 1.1rem;
        }
    </style>
</head>
<body>

<div class="topbar">
    <h5>🔒 Parolni o'zgartirish</h5>
    <div class="d-flex align-items-center gap-3">
        <span>👤 {{ request.user.username }}</span>
        <a href="javascript:history.back()" class="btn btn-sm btn-outline-light">← Orqaga</a>
    </div>
</div>

<div class="container">
    <div class="card card-form">
        <div class="card-header-custom">🔑 Yangi parol o'rnatish</div>
        <div class="card-body p-4">

            {% if messages %}
            {% for message in messages %}
            <div class="alert alert-{% if message.tags == 'error' %}danger{% else %}{{ message.tags }}{% endif %}">
                {{ message }}
            </div>
            {% endfor %}
            {% endif %}

            <form method="post">
                {% csrf_token %}
                <div class="mb-3">
                    <label class="form-label fw-bold">Eski parol</label>
                    <input type="password" name="old_password" class="form-control" required placeholder="Eski parolni kiriting">
                </div>
                <div class="mb-3">
                    <label class="form-label fw-bold">Yangi parol</label>
                    <input type="password" name="new_password" class="form-control" required placeholder="Yangi parol (kamida 4 belgi)">
                </div>
                <div class="mb-4">
                    <label class="form-label fw-bold">Yangi parolni tasdiqlang</label>
                    <input type="password" name="confirm_password" class="form-control" required placeholder="Yangi parolni qayta kiriting">
                </div>
                <button type="submit" class="btn btn-primary w-100">💾 Saqlash</button>
            </form>
        </div>
    </div>
</div>

</body>
</html>
