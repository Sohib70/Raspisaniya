{% extends 'raspisaniya/base.html' %}
{% block content %}
<h2>📚 Fanlar ro'yxati</h2>
<a href="{% url 'subject_create' %}" class="btn btn-success mb-3">➕ Fan qo'shish</a>

<table class="table table-striped table-hover">
    <thead class="table-dark">
        <tr>
            <th>#</th>
            <th>Fan nomi</th>
            <th>Qarzdor o'quvchilar</th>
            <th>Amallar</th>
        </tr>
    </thead>
    <tbody>
        {% for subject in subjects %}
        <tr>
            <td>{{ forloop.counter }}</td>
            <td>{{ subject.name }}</td>
            <td>
                <a href="{% url 'subject_students' subject.pk %}"
                   class="badge bg-danger text-decoration-none">
                    {{ subject.debt_students.count }} ta
                </a>
            </td>
            <td>
                <a href="{% url 'subject_update' subject.pk %}" class="btn btn-sm btn-warning">✏️</a>
                <a href="{% url 'subject_delete' subject.pk %}" class="btn btn-sm btn-danger">🗑️</a>
            </td>
        </tr>
        {% endfor %}
    </tbody>
</table>
{% endblock %}
