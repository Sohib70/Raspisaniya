{% extends 'raspisaniya/base.html' %}
{% block content %}

<div class="d-flex justify-content-between align-items-center mb-4">
    <h4 class="text-primary">🏫 Xona qo'shish</h4>
    <a href="{% url 'room_list' %}" class="btn btn-secondary">← Orqaga</a>
</div>

{% if messages %}
{% for message in messages %}
<div class="alert {% if message.tags == 'error' %}alert-danger{% else %}alert-success{% endif %}">{{ message }}</div>
{% endfor %}
{% endif %}

<div class="card p-4" style="max-width:400px;">
    <form method="post">
        {% csrf_token %}
        <div class="mb-3">
            <label class="form-label fw-bold">Xona nomi</label>
            <input type="text" name="name" class="form-control" placeholder="Masalan: 101-xona" required autofocus>
        </div>
        <div class="mb-3">
            <label class="form-label fw-bold">Sig'im (kishi)</label>
            <input type="number" name="capacity" class="form-control" value="30" min="1">
        </div>
        <button type="submit" class="btn btn-success">💾 Saqlash</button>
    </form>
</div>

{% endblock %}
